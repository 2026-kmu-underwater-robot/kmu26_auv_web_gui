<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AUV Localization Test</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>AUV Localization Test</h1>
          <p id="connection-state">Connecting...</p>
        </div>
        <div class="status-pills">
          <span id="stack-pill" class="pill">STACK</span>
          <span id="bag-pill" class="pill">BAG</span>
          <span id="joy-pill" class="pill">JOY</span>
        </div>
      </header>

      <section class="controls">
        <button id="start-stack" class="primary">Start Robot Stack</button>
        <button id="stop-stack">Stop Robot Stack</button>
        <button id="dvl-setup">Run DVL Setup</button>
        <button id="dvl-reset">Reset DVL DR</button>
        <button id="start-bag">Start Bag</button>
        <button id="stop-bag">Stop Bag</button>
      </section>

      <section class="grid">
        <article class="panel telemetry">
          <h2>Telemetry</h2>
          <dl>
            <div>
              <dt>Position</dt>
              <dd id="pose-value">0.00, 0.00, 0.00</dd>
            </div>
            <div>
              <dt>Yaw</dt>
              <dd id="yaw-value">0.0 deg</dd>
            </div>
            <div>
              <dt>DVL Velocity</dt>
              <dd id="velocity-value">0.00, 0.00, 0.00</dd>
            </div>
            <div>
              <dt>Depth Z</dt>
              <dd id="depth-value">0.00 m</dd>
            </div>
          </dl>
        </article>

        <article class="panel topics">
          <h2>Topic Health</h2>
          <div id="topic-list" class="topic-list"></div>
        </article>

        <article class="panel path-panel">
          <h2>Path</h2>
          <canvas id="path-canvas" width="640" height="360"></canvas>
        </article>

        <article class="panel joy-panel">
          <h2>Joy</h2>
          <div class="joy-readout">
            <div>
              <strong>Axes</strong>
              <pre id="joy-axes">[]</pre>
            </div>
            <div>
              <strong>Buttons</strong>
              <pre id="joy-buttons">[]</pre>
            </div>
          </div>
        </article>

        <article class="panel logs">
          <h2>Logs</h2>
          <pre id="log-output"></pre>
        </article>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
